<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CEVDET ❤️ NEHİR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {margin:0;font-family:Arial;background:#1a1a2e;color:white}
h1{text-align:center}

/* login */
#login{
  position:fixed;width:100%;height:100%;
  background:#000;display:flex;
  flex-direction:column;justify-content:center;
  align-items:center;
}
button{padding:10px;margin:5px;border:none;border-radius:10px}

/* mesaj */
#messages{height:50vh;overflow:auto;padding:10px}
.msg{max-width:70%;padding:10px;margin:5px;border-radius:15px}
.left{background:#444}
.right{background:#ff2e63;margin-left:auto}
img{max-width:100%;border-radius:10px}

/* input */
#inputArea{position:fixed;bottom:0;width:100%;background:#222}
#bottomBar{display:flex}
input{flex:1;padding:10px;border:none}

/* anı kutusu */
#memoryBox{
  position:fixed;top:10%;left:10%;
  width:80%;height:70%;background:#000;
  overflow:auto;display:none;padding:10px;
}
</style>
</head>
<body>

<!-- GİRİŞ -->
<div id="login">
  <h2>Kimsin? ❤️</h2>
  <button onclick="selectUser('Cevdet')">Cevdet</button>
  <button onclick="selectUser('Nehir')">Nehir</button>
</div>

<h1>CEVDET ❤️ NEHİR</h1>

<div id="messages"></div>

<div id="inputArea">
  <button onclick="sendLove()">❤️ Seni Seviyorum</button>
  <button onclick="sendMissed()">💌 Özledim</button>
  <button onclick="openMemory()">📦 Anı Kutusu</button>

  <div id="bottomBar">
    <input id="msgInput" placeholder="Mesaj yaz..." />
    <button onclick="sendMessage()">Gönder</button>
    <button onclick="sendImage()">📸</button>
  </div>
</div>

<div id="memoryBox">
  <button onclick="closeMemory()">❌ Kapat</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBpOuqC6_AQo5jCF0pF_l2jhMWS-vkdIY",
  authDomain: "cevdethenote.firebaseapp.com",
  databaseURL: "https://cevdethenote-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cevdethenote"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db,"messages");

let currentUser = "";

// giriş
window.selectUser = (name)=>{
  currentUser = name;
  document.getElementById("login").style.display="none";
}

// helper: bugün timestamp
function startOfDay() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
}

// günlük mesaj
window.sendMessage = async ()=>{
  const input = document.getElementById("msgInput");
  if(!input.value) return;

  const today = startOfDay();
  const snap = await new Promise(resolve=>{
    onValue(messagesRef, s=>resolve(s), {onlyOnce:true});
  });

  const data = snap.val()||{};
  const todayMessages = Object.values(data).filter(m=>m.user===currentUser && m.time>=today && !m.isSpecial);
  if(todayMessages.length>=1){
    alert("Bugün zaten mesaj attınız! ⏰");
    return;
  }

  push(messagesRef,{
    text:input.value,
    user:currentUser,
    time:Date.now(),
    isSpecial:false
  });

  input.value="";
}

// ❤️ sınırsız: Seni Seviyorum
window.sendLove = ()=>{
  push(messagesRef,{
    text:"Seni Seviyorum ❤️",
    user:currentUser,
    time:Date.now(),
    isSpecial:true
  });
}

// 💌 sınırsız: Özledim (sayacı güncel ve kullanıcı adı ekli)
window.sendMissed = async ()=>{
  const today = startOfDay();
  const snap = await new Promise(resolve=>{
    onValue(messagesRef, s=>resolve(s), {onlyOnce:true});
  });
  const data = snap.val()||{};
  // bugün için önceki özledim sayısını say
  const todayMissed = Object.values(data).filter(m=>m.user===currentUser && m.time>=today && m.isSpecial && m.text.includes("💌 Özledim"));
  const count = todayMissed.length + 1; // yeni ekleniyor
  push(messagesRef,{
    text:`${currentUser}: 💌 Özledim x${count}`,
    user:currentUser,
    time:Date.now(),
    isSpecial:true,
    isMissed:true
  });
}

// 📸 FOTO (BASE64)
window.sendImage = ()=>{
  const fileInput = document.createElement("input");
  fileInput.type="file";
  fileInput.accept="image/*";

  fileInput.onchange = ()=>{
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = ()=>{
      push(messagesRef,{
        image: reader.result,
        user: currentUser,
        time:Date.now(),
        isSpecial:false
      });
    };

    reader.readAsDataURL(file);
  };

  fileInput.click();
}

// mesajları göster
onValue(messagesRef,(snap)=>{
  const data = snap.val()||{};
  const container = document.getElementById("messages");
  container.innerHTML="";

  const today = startOfDay();
  const pastMessages = [];
  const todayArr = [];

  Object.values(data).forEach(item=>{
    if(item.time<today) pastMessages.push(item);
    else todayArr.push(item);
  });

  // ana ekranda sadece bugün ve günlük mesajlar
  const missedMap = {}; // kullanıcı bazlı en son Özledim
  todayArr.sort((a,b)=>a.time-b.time).forEach(item=>{
    if(item.isSpecial && item.isMissed){
      missedMap[item.user] = item.text; // en son mesajı al
    } else if(!item.isSpecial){
      const div = document.createElement("div");
      div.className="msg "+(item.user==="Cevdet"?"right":"left");
      if(item.text) div.innerHTML+=item.text;
      if(item.image) div.innerHTML+=`<img src="${item.image}">`;
      container.appendChild(div);
    } else if(item.isSpecial && !item.isMissed){ // Seni Seviyorum
      const div = document.createElement("div");
      div.className="msg "+(item.user==="Cevdet"?"right":"left");
      if(item.text) div.innerHTML+=item.text;
      container.appendChild(div);
    }
  });

  // Özledim mesajları ekle (kullanıcı adıyla)
  Object.values(missedMap).forEach(txt=>{
    const div = document.createElement("div");
    div.className="msg left"; // hep solda gösterelim
    div.innerHTML = txt;
    container.appendChild(div);
  });

  // anı kutusunda tüm mesajlar
  localStorage.setItem("memoryBox", JSON.stringify(pastMessages.concat(todayArr)));
  container.scrollTop=container.scrollHeight;
});

// anı kutusu aç
window.openMemory=()=>{
  const box=document.getElementById("memoryBox");
  box.style.display="block";
  const messages = JSON.parse(localStorage.getItem("memoryBox")||"[]");
  box.innerHTML = `<button onclick="closeMemory()">❌ Kapat</button>`;
  messages.forEach(item=>{
    const div = document.createElement("div");
    div.className="msg "+(item.user==="Cevdet"?"right":"left");
    if(item.text) div.innerHTML+=item.text;
    if(item.image) div.innerHTML+=`<img src="${item.image}">`;
    box.appendChild(div);
  });
}

// anı kutusunu kapat
window.closeMemory=()=>{document.getElementById("memoryBox").style.display="none";}
</script>
</body>
</html>
