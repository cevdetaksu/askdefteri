<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CEVDET ❤️ NEHİR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff4e88, #6a00ff);
  color: white;
  overflow: hidden;
}

h1 {
  text-align: center;
}

#messages {
  height: 60vh;
  overflow-y: auto;
  padding: 10px;
}

/* mesaj balonları */
.msg {
  max-width: 70%;
  padding: 10px;
  margin: 8px;
  border-radius: 15px;
}

.left {
  background: rgba(255,255,255,0.2);
  text-align: left;
}

.right {
  background: #ff2e63;
  margin-left: auto;
  text-align: right;
}

.name {
  font-size: 11px;
  opacity: 0.7;
}

/* input alanı */
#inputArea {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.3);
}

#topBar {
  display: flex;
  justify-content: space-between;
}

select, button {
  padding: 10px;
  border: none;
}

#bottomBar {
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
}

/* kalpler */
.heart {
  position: fixed;
  color: red;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}
</style>
</head>

<body>

<h1>CEVDET ❤️ NEHİR</h1>

<div id="messages"></div>

<div id="inputArea">

  <div id="topBar">
    <select id="userSelect">
      <option value="Cevdet">Cevdet</option>
      <option value="Nehir">Nehir</option>
    </select>

    <button onclick="toggleMusic()">🎵</button>
  </div>

  <div id="bottomBar">
    <input id="msgInput" placeholder="Mesaj yaz kankii..." />
    <button onclick="sendMessage()">Gönder</button>
  </div>

</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBpOuqC6_AQo5jCF0pF_l2jhMWS-vkdIY",
  authDomain: "cevdethenote.firebaseapp.com",
  databaseURL: "https://cevdethenote-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cevdethenote",
  storageBucket: "cevdethenote.firebasestorage.app",
  messagingSenderId: "53779979760",
  appId: "1:53779979760:web:8b7722fc6f80244027d135"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db, "messages");

// mesaj gönder
window.sendMessage = function() {
  const input = document.getElementById("msgInput");
  const user = document.getElementById("userSelect").value;

  if (input.value.trim() === "") return;

  push(messagesRef, {
    text: input.value,
    user: user,
    time: Date.now()
  });

  input.value = "";
}

// mesajları göster
onValue(messagesRef, (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("messages");

  container.innerHTML = "";

  if (!data) return;

  const messagesArray = Object.values(data);
  messagesArray.sort((a,b)=>a.time-b.time);

  messagesArray.forEach(item => {
    const msg = document.createElement("div");

    msg.className = "msg " + (item.user === "Cevdet" ? "right" : "left");

    msg.innerHTML = `
      <div class="name">${item.user}</div>
      <div>${item.text}</div>
    `;

    container.appendChild(msg);
  });

  container.scrollTop = container.scrollHeight;
});

// 🎵 müzik
const music = document.getElementById("music");
window.toggleMusic = function(){
  if(music.paused) music.play();
  else music.pause();
}

// ❤️ kalp yağmuru
setInterval(()=>{
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.animationDuration = (Math.random()*3+2)+"s";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},300);

</script>

</body>
</html>
