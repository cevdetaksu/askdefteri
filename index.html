<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CEVDET ❤️ NEHİR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#1a1a2e;color:white}
h1{text-align:center}

/* login */
#login{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{padding:10px;margin:5px;border:none;border-radius:10px}

/* mesaj */
#messages{height:60vh;overflow:auto;padding:10px}
.msg{max-width:70%;padding:10px;margin:5px;border-radius:15px}
.left{background:#444}
.right{background:#ff2e63;margin-left:auto}
img{max-width:100%;border-radius:10px}

/* input */
#inputArea{position:fixed;bottom:0;width:100%;background:#222}
#bottomBar{display:flex}
input{flex:1;padding:10px;border:none}

/* anı kutusu */
#memoryBox{
  position:fixed;
  top:10%;
  left:10%;
  width:80%;
  height:70%;
  background:#000;
  overflow:auto;
  display:none;
  padding:10px;
}
</style>
</head>

<body>

<div id="login">
  <h2>Kimsin? ❤️</h2>
  <button onclick="selectUser('Cevdet')">Cevdet</button>
  <button onclick="selectUser('Nehir')">Nehir</button>
</div>

<h1>CEVDET ❤️ NEHİR</h1>

<div id="messages"></div>

<div id="inputArea">
  <button onclick="sendLove()">❤️ Seni Seviyorum</button>
  <button onclick="openMemory()">📦 Anı Kutusu</button>

  <div id="bottomBar">
    <input id="msgInput" placeholder="Mesaj yaz..." />
    <button onclick="sendMessage()">Gönder</button>
    <button onclick="sendImage()">📸</button>
  </div>
</div>

<div id="memoryBox"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBpOuqC6_AQo5jCF0pF_l2jhMWS-vkdIY",
  authDomain: "cevdethenote.firebaseapp.com",
  databaseURL: "https://cevdethenote-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cevdethenote"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db,"messages");

let currentUser = "";

// giriş
window.selectUser = (name)=>{
  currentUser = name;
  document.getElementById("login").style.display="none";
}

// mesaj
window.sendMessage = ()=>{
  const input = document.getElementById("msgInput");
  if(!input.value) return;

  push(messagesRef,{
    text:input.value,
    user:currentUser,
    time:Date.now()
  });

  input.value="";
}

// ❤️ özel mesaj
window.sendLove = ()=>{
  push(messagesRef,{
    text:"Seni Seviyorum ❤️",
    user:currentUser,
    time:Date.now()
  });
}

// 📸 FOTO (BASE64)
window.sendImage = ()=>{
  const fileInput = document.createElement("input");
  fileInput.type="file";
  fileInput.accept="image/*";

  fileInput.onchange = ()=>{
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = ()=>{
      push(messagesRef,{
        image: reader.result, // base64
        user: currentUser,
        time: Date.now()
      });
    };

    reader.readAsDataURL(file);
  };

  fileInput.click();
}

// göster
onValue(messagesRef,(snap)=>{
  const data = snap.val();
  const container = document.getElementById("messages");
  container.innerHTML="";

  if(!data) return;

  const arr = Object.values(data).sort((a,b)=>a.time-b.time);

  arr.forEach(item=>{
    const div = document.createElement("div");
    div.className="msg "+(item.user==="Cevdet"?"right":"left");

    if(item.text) div.innerHTML+=item.text;
    if(item.image) div.innerHTML+=`<img src="${item.image}">`;

    container.appendChild(div);
  });

  container.scrollTop=container.scrollHeight;
});

// 📦 anı kutusu
window.openMemory=()=>{
  const box=document.getElementById("memoryBox");
  box.style.display="block";
  box.innerHTML=document.getElementById("messages").innerHTML;
}
</script>

</body>
</html>
