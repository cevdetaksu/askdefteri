<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>CEVDET ❤️ NEHİR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff4e88, #6a00ff);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #messages {
      height: 55vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      background: rgba(255,255,255,0.15);
      margin: 8px;
      padding: 10px;
      border-radius: 15px;
      text-align: left;
    }

    .name {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 5px;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.3);
    }

    #topBar {
      display: flex;
    }

    select {
      padding: 10px;
      border: none;
      outline: none;
    }

    #bottomBar {
      display: flex;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
    }

    button {
      padding: 15px;
      border: none;
      background: #ff2e63;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>CEVDET ❤️ NEHİR</h1>

<div id="messages"></div>

<div id="inputArea">

  <div id="topBar">
    <select id="userSelect">
      <option value="Cevdet">Cevdet</option>
      <option value="Nehir">Nehir</option>
    </select>
  </div>

  <div id="bottomBar">
    <input id="msgInput" placeholder="Mesaj yaz kankii..." />
    <button onclick="sendMessage()">Gönder</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBpOuqC6_AQo5jCF0pF_l2jhMWS-vkdIY",
    authDomain: "cevdethenote.firebaseapp.com",
    databaseURL: "https://cevdethenote-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cevdethenote",
    storageBucket: "cevdethenote.firebasestorage.app",
    messagingSenderId: "53779979760",
    appId: "1:53779979760:web:8b7722fc6f80244027d135"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const messagesRef = ref(db, "messages");

  // 📩 MESAJ GÖNDER
  window.sendMessage = function() {
    const input = document.getElementById("msgInput");
    const user = document.getElementById("userSelect").value;

    if (input.value.trim() === "") return;

    push(messagesRef, {
      text: input.value,
      user: user,
      time: Date.now()
    });

    input.value = "";
  }

  // 👀 MESAJLARI GÖSTER
  onValue(messagesRef, (snapshot) => {
    const data = snapshot.val();
    const container = document.getElementById("messages");

    container.innerHTML = "";

    if (!data) {
      container.innerHTML = "<p>Henüz mesaj yok 💔</p>";
      return;
    }

    const messagesArray = Object.values(data);

    // sırala
    messagesArray.sort((a, b) => a.time - b.time);

    messagesArray.forEach(item => {
      const msg = document.createElement("div");
      msg.className = "msg";

      msg.innerHTML = `
        <div class="name">${item.user} yazdı</div>
        <div>${item.text}</div>
      `;

      container.appendChild(msg);
    });

    container.scrollTop = container.scrollHeight;
  });
</script>

</body>
</html>
